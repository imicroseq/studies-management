version: '3.7'
name: studies-management
services:
  ego-api:
    image: 'ghcr.io/overture-stack/ego:a5eb792a'
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://ego-postgres:5432/ego?stringtype=unspecified
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_LOCATIONS: 'classpath:flyway/sql,classpath:db/migration'
      SPRING_PROFILES_ACTIVE: auth
      JWT_APP_DURATIONMS: 2147483647 # expire tokens in 24.855 days (max-int ms) for local testing
      JWT_USER_DURATIONMS: 2147483647 # expire tokens in 24.855 days (max-int ms) for local testing
    expose:
      - '8080'
    ports:
      - '8081:8080'
    depends_on:
      - ego-postgres
  ego-postgres:
    image: postgres:11.1
    environment:
      - POSTGRES_DB=ego
      - POSTGRES_PASSWORD=password
    expose:
      - '5432'
    volumes:
      - './ego-init:/docker-entrypoint-initdb.d'
    ports:
      - '9445:5432'

  song-db:
    image: postgres:11.1
    environment:
      POSTGRES_DB: song
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '8432:5432'
    volumes:
      - './song-db-init:/docker-entrypoint-initdb.d'
  song-server:
    image: ghcr.io/overture-stack/song-server:5.3.0
    environment:
      SERVER_PORT: 8089
      SPRING_PROFILES_ACTIVE: 'prod,secure,default,score-client-cred'
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_PUBLIC_KEY_LOCATION: http://ego-api:8080/oauth/token/public_key
      AUTH_SERVER_INTROSPECTIONURI: http://ego-api:8080/o/check_api_key/
      AUTH_SERVER_CLIENTID: adminId
      AUTH_SERVER_TOKENNAME: apiKey
      AUTH_SERVER_CLIENTSECRET: adminSecret
      AUTH_SERVER_PROVIDER: ego
      AUTH_SERVER_SCOPE_STUDY_PREFIX: song.
      AUTH_SERVER_SCOPE_STUDY_SUFFIX: .WRITE
      AUTH_SERVER_SCOPE_SYSTEM: song.WRITE
      SCORE_URL: http://score-api:8080
      SCORE_CLIENTCREDENTIALS_ID: adminId
      SCORE_CLIENTCREDENTIALS_SECRET: adminSecret
      SCORE_CLIENTCREDENTIALS_TOKENURL: http://score-api:8080/oauth/token
      SCORE_CLIENTCREDENTIALS_SYSTEMSCOPE: 'score.WRITE'
      MANAGEMENT_SERVER_PORT: 8088
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_DATASOURCE_URL: jdbc:postgresql://song-db:5432/song?stringtype=unspecified
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_LOCATIONS: 'classpath:db/migration'
    ports:
      - '5006:5006'
      - '8089:8089'
    depends_on:
      - song-db
      - ego-api
      - ego-postgres
